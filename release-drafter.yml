# release-drafter.yml
# Configures auto-generated release notes from PR labels.
# Docs: https://github.com/release-drafter/release-drafter

name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels: ['feature', 'enhancement', 'feat']
  - title: '🐛 Bug Fixes'
    labels: ['fix', 'bug']
  - title: '🔒 Security'
    labels: ['security']
  - title: '📦 Dependencies'
    labels: ['dependencies']
  - title: '🤖 AI / Memory'
    labels: ['ai', 'memory']
  - title: '🧹 Maintenance'
    labels: ['chore', 'refactor', 'docs']

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ['major', 'breaking-change']
  minor:
    labels: ['minor', 'feature', 'feat', 'enhancement']
  patch:
    labels: ['patch', 'fix', 'bug', 'chore', 'docs', 'security', 'dependencies']
  default: patch

template: |
  ## What's Changed
  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
