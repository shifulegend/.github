# dependabot.yml
# Keeps GitHub Actions pinned to latest versions automatically.
# Add ecosystem-specific entries for your stack below.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # GitHub Actions — always keep workflows up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"

  # Node / npm — uncomment if your project uses Node
  # - package-ecosystem: "npm"
  #   directory: "/"
  #   schedule:
  #     interval: "weekly"
  #   commit-message:
  #     prefix: "chore(deps)"
  #   labels:
  #     - "dependencies"

  # Python / pip — uncomment if your project uses Python
  # - package-ecosystem: "pip"
